<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- 背景 -->
  <rect width="512" height="512" rx="112" fill="#040805"/>
  
  <!-- 光沢エフェクト (グラデーション背景) -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#040805" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chart-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#05d993"/>
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>
  
  <!-- チャートグリッドの抽象表現（サイバー風背景線） -->
  <line x1="120" y1="200" x2="392" y2="200" stroke="#122c19" stroke-width="2" stroke-dasharray="8,8"/>
  <line x1="120" y1="300" x2="392" y2="300" stroke="#122c19" stroke-width="2" stroke-dasharray="8,8"/>
  
  <!-- ローソク足チャート (右肩上がり) -->
  <!-- ローソク足 1 (左) - 陰線 (緑) -->
  <line x1="180" y1="260" x2="180" y2="360" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
  <rect x="168" y="280" width="24" height="60" rx="4" fill="#10b981" opacity="0.8"/>
 
  <!-- ローソク足 2 (中央) - 陽線 (赤) -->
  <line x1="260" y1="180" x2="260" y2="300" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
  <rect x="248" y="200" width="24" height="70" rx="4" fill="#ef4444"/>
 
  <!-- ローソク足 3 (右) - 陽線 (赤) -->
  <line x1="340" y1="120" x2="340" y2="240" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
  <rect x="328" y="140" width="24" height="70" rx="4" fill="#ef4444"/>
  
  <!-- サイバー風再生マーク (中央に大きく配置して重ねる) -->
  <polygon points="220,200 220,312 318,256" fill="#10b981" opacity="0.85" />
  <polygon points="228,218 228,294 294,256" fill="#05d993"/>
</svg>
