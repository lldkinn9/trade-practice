<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- 背景 -->
  <rect width="512" height="512" rx="112" fill="#05020c"/>
  
  <defs>
    <!-- グラデーションとフィルター (グロー効果) -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bd00ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#05020c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="neon-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bd00ff"/>
      <stop offset="100%" stop-color="#00f0ff"/>
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- バックグロー -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>
  
  <!-- グリッド風の背景 -->
  <path d="M 120,256 L 392,256" stroke="#2d1b4e" stroke-width="2" stroke-dasharray="10,10" opacity="0.6"/>
  <path d="M 256,120 L 256,392" stroke="#2d1b4e" stroke-width="2" stroke-dasharray="10,10" opacity="0.6"/>
  
  <!-- ネオン外枠（デジタルフレーム） -->
  <rect x="80" y="80" width="352" height="352" rx="60" fill="none" stroke="url(#neon-grad)" stroke-width="4" opacity="0.4" />
  
  <!-- 未来的な三角形（再生マーク 兼 グラフの上昇トレンド） -->
  <polygon points="210,170 210,342 356,256" fill="none" stroke="#00f0ff" stroke-width="8" filter="url(#neon-glow)" stroke-linejoin="round" />
  <polygon points="220,195 220,317 325,256" fill="url(#neon-grad)" opacity="0.85" stroke-linejoin="round" />

  <!-- テクニカル分析のシンボル（回路風ローソク足） -->
  <line x1="150" y1="130" x2="150" y2="230" stroke="#00f0ff" stroke-width="4" stroke-linecap="round"/>
  <circle cx="150" cy="180" r="12" fill="#05020c" stroke="#00f0ff" stroke-width="4" />

  <line x1="362" y1="282" x2="362" y2="382" stroke="#bd00ff" stroke-width="4" stroke-linecap="round"/>
  <circle cx="362" cy="332" r="12" fill="#05020c" stroke="#bd00ff" stroke-width="4" />
</svg>
